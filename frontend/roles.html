<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roles — SaaS Platform</title>
  <link rel="stylesheet" href="/static/css/main.css?v=3">
  <style>
    /* ── Permission matrix ──────────────────────────────────────────────── */
    .perm-module-header {
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em;
      color: var(--text-muted); padding: 12px 0 6px; margin-top: 4px;
      border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }
    .perm-module-header:first-child { padding-top: 0; }
    .perm-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 7px 6px; border-radius: var(--radius-sm);
      cursor: pointer; transition: background var(--transition-fast);
    }
    .perm-row:hover { background: var(--bg-hover); }
    .perm-row input[type="checkbox"] {
      margin-top: 2px; flex-shrink: 0;
      accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer;
    }
    .perm-label { display: flex; flex-direction: column; gap: 1px; }
    .perm-name  { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .perm-code  { font-size: 11px; color: var(--text-muted); font-family: monospace; }
    .perm-desc  { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

    /* ── Role cards ─────────────────────────────────────────────────────── */
    .role-card {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 13px; border-radius: var(--radius-md);
      border: 1px solid var(--border); background: var(--bg-surface);
      cursor: pointer;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      margin-bottom: 6px;
    }
    .role-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
    .role-card.selected { border-color: var(--accent); background: var(--accent-muted); }
    .role-card-icon {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      background: var(--accent-light); color: var(--accent-dark);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .role-card-body { flex: 1; min-width: 0; }
    .role-card-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .role-card-meta { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .badge-system {
      font-size: 10px; font-weight: 600; padding: 2px 7px;
      background: var(--info-bg); color: var(--info);
      border-radius: var(--radius-full); white-space: nowrap; flex-shrink: 0;
    }
    .badge-inactive {
      font-size: 10px; font-weight: 600; padding: 2px 7px;
      background: var(--warning-bg); color: var(--warning);
      border-radius: var(--radius-full); white-space: nowrap; flex-shrink: 0;
    }
    .role-card.role-inactive { opacity: .6; }

    /* ── Two-column layout ──────────────────────────────────────────────── */
    .roles-layout {
      display: grid; grid-template-columns: 300px 1fr;
      gap: var(--space-5); align-items: start;
    }
    @media (max-width: 860px) { .roles-layout { grid-template-columns: 1fr; } }
    .roles-sidebar { position: sticky; top: 70px; }

    .section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-muted); margin-bottom: var(--space-3);
    }
    .perm-select-all {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text-secondary);
      padding: 5px 6px; cursor: pointer; border-radius: var(--radius-sm);
      transition: background var(--transition-fast);
    }
    .perm-select-all:hover { background: var(--bg-hover); }
    .perm-select-all input { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    .empty-editor {
      padding: var(--space-10) var(--space-6); text-align: center; color: var(--text-muted);
      display: flex; flex-direction: column; align-items: center;
      gap: var(--space-3); min-height: 260px; justify-content: center;
    }
  </style>
</head>
<body data-page="roles">

<div id="app-shell">

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">S</div>
      <span class="brand-name">SaaS Platform</span>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="profile-trigger" id="profile-trigger">
        <div class="avatar" id="sidebar-avatar">?</div>
        <div class="profile-info">
          <div class="profile-name" id="sidebar-name">…</div>
          <div class="profile-role" id="sidebar-role"></div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="profile-menu" id="profile-menu">
        <div class="menu-item" onclick="window.location.href='/settings.html'">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Configuración
        </div>
        <div class="menu-item" id="theme-toggle-btn">
          <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span id="theme-label">Modo oscuro</span>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="help-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Ayuda
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item danger" id="logout-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cerrar sesión
        </div>
      </div>
    </div>
  </nav>

  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title">Roles y Permisos</span>
      <div class="topbar-spacer"></div>
      <button class="btn btn-primary btn-sm" id="btn-new-role" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo rol
      </button>
    </header>

    <main class="page-area">
      <div class="roles-layout">

        <!-- Lista de roles -->
        <div class="roles-sidebar">
          <div class="card" style="padding:var(--space-4);">
            <div id="tenant-filter-wrapper" style="display:none;margin-bottom:var(--space-3);">
              <select class="form-input form-select" id="filter-tenant" style="width:100%;">
                <option value="">Todos los tenants</option>
              </select>
            </div>
            <div style="margin-bottom:var(--space-3);">
              <div class="search-input-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input class="form-input" type="text" id="search-roles" placeholder="Buscar roles…" style="width:100%;">
              </div>
            </div>
            <div id="roles-list">
              <div style="padding:24px;text-align:center;"><div class="spinner" style="margin:0 auto;"></div></div>
            </div>
          </div>
        </div>

        <!-- Editor de rol -->
        <div id="role-editor-area">
          <div class="card empty-editor">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" opacity=".25">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span style="font-size:14px;">Selecciona un rol para gestionar sus permisos</span>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<!-- Modal: Nuevo rol -->
<div class="modal" id="new-role-modal">
  <div class="modal-header">
    <span class="modal-title">Nuevo rol</span>
    <button class="btn btn-ghost btn-icon" id="new-role-close">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="modal-body">
    <div id="new-role-error" style="display:none;background:var(--error-bg);border:1px solid var(--error);color:var(--error);padding:10px 14px;border-radius:var(--radius-md);font-size:13px;"></div>
    <div class="form-group">
      <label class="form-label">Nombre <span style="color:var(--error)">*</span></label>
      <input class="form-input" type="text" id="new-role-name" placeholder="Ej: Analista, Supervisor…" maxlength="200">
    </div>
    <div class="form-group">
      <label class="form-label">Descripción</label>
      <textarea class="form-input" id="new-role-desc" rows="3" placeholder="Descripción opcional…" style="resize:vertical;" maxlength="500"></textarea>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" id="new-role-cancel">Cancelar</button>
    <button class="btn btn-primary" id="new-role-save">
      <span id="new-role-txt">Crear rol</span>
      <span class="spinner" id="new-role-spin" style="display:none;width:14px;height:14px;border-width:2px;"></span>
    </button>
  </div>
</div>

<!-- Modal: Editar rol -->
<div class="modal" id="edit-role-modal">
  <div class="modal-header">
    <span class="modal-title">Editar rol</span>
    <button class="btn btn-ghost btn-icon" id="edit-role-close">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="modal-body">
    <div id="edit-role-error" style="display:none;background:var(--error-bg);border:1px solid var(--error);color:var(--error);padding:10px 14px;border-radius:var(--radius-md);font-size:13px;"></div>
    <input type="hidden" id="edit-role-id">
    <div class="form-group">
      <label class="form-label">Nombre <span style="color:var(--error)">*</span></label>
      <input class="form-input" type="text" id="edit-role-name" maxlength="200">
    </div>
    <div class="form-group">
      <label class="form-label">Descripción</label>
      <textarea class="form-input" id="edit-role-desc" rows="3" style="resize:vertical;" maxlength="500"></textarea>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;color:var(--text-secondary);">
        <input type="checkbox" id="edit-role-active" style="width:15px;height:15px;accent-color:var(--accent);">
        Rol activo
      </label>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" id="edit-role-cancel">Cancelar</button>
    <button class="btn btn-primary" id="edit-role-save">
      <span id="edit-role-txt">Guardar cambios</span>
      <span class="spinner" id="edit-role-spin" style="display:none;width:14px;height:14px;border-width:2px;"></span>
    </button>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import api from '/static/js/api.js?v=4';
import { requireAuth, logout, renderProfile } from '/static/js/auth.js?v=3';
import { initTheme, initProfileMenu, toggleTheme, openModal, closeModal, confirm } from '/static/js/ui.js?v=3';
import { toast } from '/static/js/toast.js?v=3';

initTheme();
const user = await requireAuth();
renderProfile(user);
initProfileMenu();

const isSuperadmin = user.role === 'superadmin';
const isAdmin      = user.role === 'admin' || isSuperadmin;

// ── Sidebar ────────────────────────────────────────────────────────────────────
document.getElementById('sidebar-nav').innerHTML = `
  <div class="nav-item" onclick="window.location.href='/app.html'">
    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Dashboard
  </div>
  ${isSuperadmin ? `
  <div class="nav-section-label">Administración</div>
  <div class="nav-item" onclick="window.location.href='/tenants.html'">
    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Tenants
  </div>` : '<div class="nav-section-label">Mi organización</div>'}
  <div class="nav-item" onclick="window.location.href='/users.html'">
    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
    Usuarios
  </div>
  <div class="nav-item" onclick="window.location.href='/groups.html'">
    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Grupos
  </div>
  <div class="nav-item active">
    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Roles
  </div>
`;

// ── Profile menu ───────────────────────────────────────────────────────────────
function _syncThemeUI() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('theme-label').textContent   = dark ? 'Modo claro' : 'Modo oscuro';
  document.getElementById('theme-icon-sun').style.display  = dark ? 'none'  : 'block';
  document.getElementById('theme-icon-moon').style.display = dark ? 'block' : 'none';
}
_syncThemeUI();
document.getElementById('theme-toggle-btn').addEventListener('click', e => { e.stopPropagation(); toggleTheme(); _syncThemeUI(); });
document.getElementById('help-btn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('profile-menu').classList.remove('open');
  toast.info('Sección de ayuda próximamente.');
});
document.getElementById('logout-btn').addEventListener('click', e => { e.stopPropagation(); logout(); });

// ── Helpers ────────────────────────────────────────────────────────────────────
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── State ──────────────────────────────────────────────────────────────────────
let allRoles       = [];
let allPermissions = [];
let selectedRoleId = null;

// ── Load permissions catalog ───────────────────────────────────────────────────
async function loadPermissions() {
  try {
    const data = await api.get('/permissions?size=200');
    allPermissions = data.items || [];
  } catch(e) {
    console.warn('No se pudo cargar catálogo de permisos:', e.message);
  }
}

// ── Load roles ─────────────────────────────────────────────────────────────────
async function loadRoles() {
  const search    = document.getElementById('search-roles').value.trim();
  const tenantEl  = document.getElementById('filter-tenant');
  const tenantId  = tenantEl ? tenantEl.value : '';

  const params = new URLSearchParams({ size: '100' });
  if (search)   params.set('search', search);
  if (tenantId) params.set('tenant_id', tenantId);

  try {
    const data = await api.get(`/roles?${params}`);
    allRoles = data.items || [];
    renderRolesList();
  } catch(e) {
    document.getElementById('roles-list').innerHTML =
      `<p style="font-size:13px;color:var(--error);padding:8px 0;">Error al cargar roles: ${esc(e.message)}</p>`;
  }
}

function renderRolesList() {
  const el = document.getElementById('roles-list');
  if (!allRoles.length) {
    el.innerHTML = `<p style="font-size:13px;color:var(--text-muted);text-align:center;padding:20px 0;">
      ${isAdmin ? 'Sin roles. Usa <strong>+ Nuevo rol</strong> para crear uno.' : 'Sin roles definidos.'}
    </p>`;
    return;
  }
  el.innerHTML = allRoles.map(r => `
    <div class="role-card${r.id === selectedRoleId ? ' selected' : ''}${!r.is_active ? ' role-inactive' : ''}"
         onclick="selectRole('${r.id}')">
      <div class="role-card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div class="role-card-body">
        <div class="role-card-name">${esc(r.name)}</div>
        <div class="role-card-meta">${(r.permissions||[]).length} permisos · ${r.user_count ?? 0} usuarios</div>
      </div>
      ${r.is_system ? '<span class="badge-system">Sistema</span>' : ''}
      ${!r.is_active ? '<span class="badge-inactive">Inactivo</span>' : ''}
    </div>`).join('');
}

// ── Select role ────────────────────────────────────────────────────────────────
window.selectRole = function(roleId) {
  selectedRoleId = roleId;
  renderRolesList();
  const role = allRoles.find(r => r.id === roleId);
  if (role) renderEditor(role);
};

// ── Render editor ──────────────────────────────────────────────────────────────
function renderEditor(role) {
  const assigned = new Set((role.permissions || []).map(p => p.id));
  const canEdit  = !role.is_system && isAdmin;

  // Group permissions by module
  const byModule = {};
  for (const p of allPermissions) {
    (byModule[p.module] = byModule[p.module] || []).push(p);
  }

  const matrixHTML = Object.entries(byModule).map(([mod, perms]) => `
    <div class="perm-module-header">${esc(mod)}</div>
    ${perms.map(p => `
      <label class="perm-row">
        <input type="checkbox" class="perm-check" data-perm-id="${p.id}"
          ${assigned.has(p.id) ? 'checked' : ''} ${!canEdit ? 'disabled' : ''}>
        <div class="perm-label">
          <span class="perm-name">${esc(p.name)}</span>
          <span class="perm-code">${esc(p.code)}</span>
          ${p.description ? `<span class="perm-desc">${esc(p.description)}</span>` : ''}
        </div>
      </label>`).join('')}
  `).join('');

  document.getElementById('role-editor-area').innerHTML = `
    <div class="card" style="padding:var(--space-5);">

      <!-- Encabezado -->
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);margin-bottom:var(--space-5);">
        <div style="flex:1;min-width:0;">
          <h2 style="font-size:18px;font-weight:700;color:var(--text-primary);margin:0 0 3px;">${esc(role.name)}</h2>
          <p style="font-size:13px;color:var(--text-muted);margin:0 0 8px;">
            ${role.description ? esc(role.description) : '<em>Sin descripción</em>'}
          </p>
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
            ${role.is_system ? '<span class="badge-system">Sistema</span>' : ''}
            ${!role.is_active ? '<span class="badge-inactive">Inactivo</span>' : ''}
            <span style="font-size:11px;color:var(--text-muted);">${(role.permissions||[]).length} permisos asignados · ${role.user_count ?? 0} usuarios</span>
          </div>
        </div>
        ${canEdit ? `
        <div style="display:flex;gap:var(--space-2);flex-shrink:0;">
          <button class="btn btn-secondary btn-sm" id="btn-edit-meta">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Editar
          </button>
          <button class="btn btn-sm" id="btn-delete-role"
            style="background:var(--error-bg);color:var(--error);border:1px solid var(--error);">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Eliminar
          </button>
        </div>` : ''}
      </div>

      <!-- Matriz de permisos -->
      <div style="margin-bottom:var(--space-4);">
        <div class="section-label">Permisos del rol</div>
        ${canEdit ? `
        <label class="perm-select-all" style="margin-bottom:var(--space-2);">
          <input type="checkbox" id="check-all"> Seleccionar / deseleccionar todos
        </label>` : ''}
        <div id="perm-matrix">
          ${allPermissions.length ? matrixHTML
            : '<p style="font-size:13px;color:var(--text-muted);">Cargando catálogo de permisos…</p>'}
        </div>
      </div>

      <!-- Footer con guardar -->
      ${canEdit ? `
      <div style="display:flex;align-items:center;justify-content:flex-end;gap:var(--space-3);padding-top:var(--space-4);border-top:1px solid var(--border);">
        <span id="save-status" style="font-size:13px;"></span>
        <button class="btn btn-primary" id="btn-save-perms">
          <span id="save-perms-txt">Guardar permisos</span>
          <span class="spinner" id="save-perms-spin" style="display:none;width:14px;height:14px;border-width:2px;"></span>
        </button>
      </div>` : `
      <p style="font-size:12px;color:var(--text-muted);padding-top:var(--space-3);border-top:1px solid var(--border);margin:0;">
        Los roles de sistema son de solo lectura.
      </p>`}
    </div>
  `;

  if (!canEdit) return;

  // Check-all lógica
  const checkAll = document.getElementById('check-all');
  const allChecks = () => [...document.querySelectorAll('.perm-check')];
  function _syncCheckAll() {
    const checks = allChecks();
    const total  = checks.length;
    const checked = checks.filter(c => c.checked).length;
    checkAll.checked       = total > 0 && checked === total;
    checkAll.indeterminate = checked > 0 && checked < total;
  }
  _syncCheckAll();
  checkAll.addEventListener('change', () => allChecks().forEach(c => c.checked = checkAll.checked));
  document.getElementById('perm-matrix').addEventListener('change', _syncCheckAll);

  // Botones
  document.getElementById('btn-edit-meta').addEventListener('click',   () => openEditModal(role));
  document.getElementById('btn-delete-role').addEventListener('click', () => deleteRole(role));
  document.getElementById('btn-save-perms').addEventListener('click',  () => savePermissions(role.id));
}

// ── Guardar permisos ───────────────────────────────────────────────────────────
async function savePermissions(roleId) {
  const ids  = [...document.querySelectorAll('.perm-check:checked')].map(c => c.dataset.permId);
  const btn  = document.getElementById('btn-save-perms');
  const txt  = document.getElementById('save-perms-txt');
  const spin = document.getElementById('save-perms-spin');
  const stat = document.getElementById('save-status');

  btn.disabled = true; txt.style.display = 'none'; spin.style.display = 'inline-block';
  stat.textContent = ''; stat.style.color = '';

  try {
    await api.put(`/roles/${roleId}/permissions`, { permission_ids: ids });
    stat.textContent = '✓ Guardado'; stat.style.color = 'var(--success)';
    toast.success('Permisos actualizados correctamente.');
    await loadRoles();
    const updated = allRoles.find(r => r.id === roleId);
    if (updated) renderEditor(updated);
  } catch(e) {
    stat.textContent = 'Error al guardar'; stat.style.color = 'var(--error)';
    toast.error(e.message || 'Error al guardar permisos.');
    btn.disabled = false; txt.style.display = ''; spin.style.display = 'none';
  }
}

// ── Modal: Editar metadata ─────────────────────────────────────────────────────
function openEditModal(role) {
  document.getElementById('edit-role-id').value       = role.id;
  document.getElementById('edit-role-name').value     = role.name;
  document.getElementById('edit-role-desc').value     = role.description || '';
  document.getElementById('edit-role-active').checked = role.is_active;
  document.getElementById('edit-role-error').style.display = 'none';
  openModal('edit-role-modal');
}

document.getElementById('edit-role-close').addEventListener('click',  () => closeModal('edit-role-modal'));
document.getElementById('edit-role-cancel').addEventListener('click', () => closeModal('edit-role-modal'));

document.getElementById('edit-role-save').addEventListener('click', async () => {
  const roleId = document.getElementById('edit-role-id').value;
  const name   = document.getElementById('edit-role-name').value.trim();
  const desc   = document.getElementById('edit-role-desc').value.trim();
  const active = document.getElementById('edit-role-active').checked;
  const errEl  = document.getElementById('edit-role-error');
  const btn    = document.getElementById('edit-role-save');
  const txt    = document.getElementById('edit-role-txt');
  const spin   = document.getElementById('edit-role-spin');

  if (!name) { errEl.textContent = 'El nombre es obligatorio.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  btn.disabled = true; txt.style.display = 'none'; spin.style.display = 'inline-block';

  try {
    await api.patch(`/roles/${roleId}`, { name, description: desc || null, is_active: active });
    toast.success('Rol actualizado.');
    closeModal('edit-role-modal');
    await loadRoles();
    const updated = allRoles.find(r => r.id === roleId);
    if (updated) renderEditor(updated);
  } catch(e) {
    errEl.textContent = e.message || 'Error al actualizar el rol.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false; txt.style.display = ''; spin.style.display = 'none';
  }
});

// ── Eliminar rol ───────────────────────────────────────────────────────────────
async function deleteRole(role) {
  // confirm() de ui.js: firma = confirm(message, title) → Promise<boolean>
  const ok = await confirm(
    `¿Eliminar el rol "${role.name}"? Esta acción no se puede deshacer.`,
    'Eliminar rol'
  );
  if (!ok) return;

  try {
    await api.delete(`/roles/${role.id}`);
    toast.success(`Rol "${role.name}" eliminado.`);
    selectedRoleId = null;
    document.getElementById('role-editor-area').innerHTML = `
      <div class="card empty-editor">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" opacity=".25"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span style="font-size:14px;">Selecciona un rol para gestionar sus permisos</span>
      </div>`;
    await loadRoles();
  } catch(e) {
    toast.error(e.message || 'Error al eliminar el rol.');
  }
}

// ── Búsqueda ───────────────────────────────────────────────────────────────────
let _searchTimer;
document.getElementById('search-roles').addEventListener('input', () => {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(loadRoles, 280);
});

// ── Modal: Nuevo rol ───────────────────────────────────────────────────────────
if (isAdmin) {
  document.getElementById('btn-new-role').style.display = '';
}

document.getElementById('btn-new-role').addEventListener('click', () => {
  document.getElementById('new-role-name').value = '';
  document.getElementById('new-role-desc').value = '';
  document.getElementById('new-role-error').style.display = 'none';
  openModal('new-role-modal');
});
document.getElementById('new-role-close').addEventListener('click',  () => closeModal('new-role-modal'));
document.getElementById('new-role-cancel').addEventListener('click', () => closeModal('new-role-modal'));

document.getElementById('new-role-save').addEventListener('click', async () => {
  const name  = document.getElementById('new-role-name').value.trim();
  const desc  = document.getElementById('new-role-desc').value.trim();
  const errEl = document.getElementById('new-role-error');
  const btn   = document.getElementById('new-role-save');
  const txt   = document.getElementById('new-role-txt');
  const spin  = document.getElementById('new-role-spin');

  if (!name) { errEl.textContent = 'El nombre es obligatorio.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  btn.disabled = true; txt.style.display = 'none'; spin.style.display = 'inline-block';

  try {
    const created = await api.post('/roles', { name, description: desc || null, permission_ids: [] });
    toast.success(`Rol "${created.name}" creado. Ahora asígnale permisos.`);
    closeModal('new-role-modal');
    await loadRoles();
    selectRole(created.id);
  } catch(e) {
    errEl.textContent = e.message || 'Error al crear el rol.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false; txt.style.display = ''; spin.style.display = 'none';
  }
});

// ── Init ───────────────────────────────────────────────────────────────────────
// Superadmin: load tenant selector first, then roles
if (isSuperadmin) {
  document.getElementById('tenant-filter-wrapper').style.display = 'block';
  try {
    const td = await api.get('/tenants?size=100');
    const opts = (td.items || []).map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('');
    document.getElementById('filter-tenant').innerHTML =
      '<option value="">Todos los tenants</option>' + opts;
  } catch(e) { /* ignore */ }
  document.getElementById('filter-tenant').addEventListener('change', loadRoles);
}

await loadPermissions();
await loadRoles();
</script>
</body>
</html>
