<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trabajadores — Nómina</title>
  <link rel="stylesheet" href="/static/css/main.css?v=4">
</head>
<body data-page="trabajadores">

<div id="app-shell">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">N</div>
      <span class="brand-name">Nómina SaaS</span>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="profile-trigger" id="profile-trigger">
        <div class="avatar" id="sidebar-avatar">?</div>
        <div class="profile-info">
          <div class="profile-name" id="sidebar-name">…</div>
          <div class="profile-role" id="sidebar-role"></div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="profile-menu" id="profile-menu">
        <div class="menu-item" onclick="window.location.href='/settings.html'">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Configuración
        </div>
        <div class="menu-item" id="theme-toggle-btn">
          <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span id="theme-label">Modo oscuro</span>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="help-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Ayuda
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item danger" id="logout-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cerrar sesión
        </div>
      </div>
    </div>
  </nav>

  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title">Trabajadores</span>
      <div class="topbar-spacer"></div>
      <button class="btn btn-primary btn-sm" id="btn-nuevo">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo trabajador
      </button>
    </header>

    <main class="page-area">
      <div style="max-width:1200px;">

        <!-- Toolbar -->
        <div class="toolbar" style="margin-bottom:var(--space-4);">
          <div class="search-input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="form-input" type="text" id="search-input" placeholder="Buscar por nombre, RUT, código…">
          </div>
          <select class="form-input form-select" id="filter-sucursal" style="width:auto;min-width:160px;">
            <option value="">Todas las sucursales</option>
          </select>
          <select class="form-input form-select" id="filter-cargo" style="width:auto;min-width:150px;">
            <option value="">Todos los cargos</option>
          </select>
          <select class="form-input form-select" id="filter-activos" style="width:auto;min-width:130px;">
            <option value="true">Solo activos</option>
            <option value="">Todos</option>
            <option value="false">Inactivos</option>
          </select>
          <span id="total-count" style="font-size:13px;color:var(--text-muted);white-space:nowrap;"></span>
        </div>

        <!-- Tabla -->
        <div class="card">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Código</th>
                  <th>RUT</th>
                  <th>Nombre</th>
                  <th>Cargo</th>
                  <th>Sucursal</th>
                  <th>F. Contrato</th>
                  <th>Estado</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="tbody">
                <tr><td colspan="8"><div style="padding:40px;text-align:center;"><div class="spinner" style="margin:0 auto;"></div></div></td></tr>
              </tbody>
            </table>
          </div>
          <div class="pagination" id="pagination"></div>
        </div>

      </div>
    </main>
  </div>
</div>

<!-- Modal: nuevo trabajador -->
<div class="modal" id="modal-nuevo">
  <div class="modal-header">
    <span class="modal-title">Nuevo trabajador</span>
    <button class="btn btn-ghost btn-sm" id="modal-close">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="modal-body">
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Código *</label>
        <input class="form-input" id="f-codigo" type="text" placeholder="Ej: EMP001" maxlength="20">
      </div>
      <div class="form-group">
        <label class="form-label">RUT *</label>
        <input class="form-input" id="f-rut" type="text" placeholder="Ej: 12.345.678-9">
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Nombres *</label>
        <input class="form-input" id="f-nombres" type="text" placeholder="Nombres">
      </div>
      <div class="form-group">
        <label class="form-label">Apellido paterno *</label>
        <input class="form-input" id="f-ap" type="text" placeholder="Apellido paterno">
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Apellido materno</label>
        <input class="form-input" id="f-am" type="text" placeholder="Apellido materno">
      </div>
      <div class="form-group">
        <label class="form-label">Fecha de contrato</label>
        <input class="form-input" id="f-fecha" type="date">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="f-email" type="email" placeholder="correo@empresa.cl">
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" id="modal-cancel">Cancelar</button>
    <button class="btn btn-primary" id="modal-save">Crear trabajador</button>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import api from '/static/js/api.js?v=4';
import { requireAuth } from '/static/js/auth.js?v=3';
import { initTheme, openModal, closeModal, setLoading, renderPagination } from '/static/js/ui.js?v=3';
import { toast } from '/static/js/toast.js?v=3';
import { initShellUI } from '/static/js/nav.js';

initTheme();
const user = await requireAuth();
initShellUI(user);

// ── Estado ────────────────────────────────────────────────────────────────────
let state = { page: 1, size: 25, search: '', sucursal_id: '', cargo_id: '', solo_activos: 'true' };
let catalogs = { cargos: [], sucursales: [] };

// ── Catálogos ─────────────────────────────────────────────────────────────────
async function loadCatalogs() {
  const [cargos, sucursales] = await Promise.allSettled([
    api.get('/nomina/cargos?size=200'),
    api.get('/nomina/sucursales?size=200'),
  ]);

  if (cargos.status === 'fulfilled') {
    catalogs.cargos = cargos.value.items ?? cargos.value ?? [];
    const sel = document.getElementById('filter-cargo');
    catalogs.cargos.forEach(c => {
      sel.insertAdjacentHTML('beforeend', `<option value="${c.id}">${c.descripcion}</option>`);
    });
  }
  if (sucursales.status === 'fulfilled') {
    catalogs.sucursales = sucursales.value.items ?? sucursales.value ?? [];
    const sel = document.getElementById('filter-sucursal');
    catalogs.sucursales.forEach(s => {
      sel.insertAdjacentHTML('beforeend', `<option value="${s.id}">${s.nombre}</option>`);
    });
  }
}

function findName(arr, id, field = 'nombre') {
  if (!id) return '—';
  const found = arr.find(x => x.id === id);
  return found ? found[field] : '—';
}

// ── Lista ─────────────────────────────────────────────────────────────────────
async function loadList() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = `<tr><td colspan="8"><div style="padding:32px;text-align:center;"><div class="spinner" style="margin:0 auto;"></div></div></td></tr>`;

  const params = new URLSearchParams({ page: state.page, size: state.size });
  if (state.search)      params.set('search', state.search);
  if (state.sucursal_id) params.set('sucursal_id', state.sucursal_id);
  if (state.cargo_id)    params.set('cargo_id', state.cargo_id);
  if (state.solo_activos) params.set('solo_activos', state.solo_activos);

  try {
    const data = await api.get(`/rrhh/trabajadores?${params}`);
    const items = data.items ?? [];
    document.getElementById('total-count').textContent = `${data.total} trabajador${data.total !== 1 ? 'es' : ''}`;

    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="8">
        <div class="empty-state">
          <div class="empty-state-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
          <h3>Sin trabajadores</h3>
          <p>Crea el primer trabajador para comenzar.</p>
        </div>
      </td></tr>`;
      renderPagination(document.getElementById('pagination'), { page: 1, total: 0, size: state.size }, () => {});
      return;
    }

    tbody.innerHTML = items.map(t => `
      <tr style="cursor:pointer;" onclick="window.location.href='/rrhh/trabajador.html?id=${t.id}'">
        <td><span style="font-family:monospace;font-size:12px;color:var(--text-muted);">${t.codigo}</span></td>
        <td><span style="font-family:monospace;">${t.rut}</span></td>
        <td class="td-primary">${t.nombre_completo}</td>
        <td>${findName(catalogs.cargos, t.cargo_id, 'descripcion')}</td>
        <td>${findName(catalogs.sucursales, t.sucursal_id)}</td>
        <td>${t.fecha_contrato ? new Date(t.fecha_contrato + 'T00:00:00').toLocaleDateString('es-CL') : '—'}</td>
        <td>
          <span class="badge ${t.es_activo ? 'badge-success' : 'badge-neutral'}">
            ${t.es_activo ? 'Activo' : 'Inactivo'}
          </span>
        </td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();window.location.href='/rrhh/trabajador.html?id=${t.id}'"
            title="Ver ficha">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </td>
      </tr>
    `).join('');

    renderPagination(document.getElementById('pagination'), { page: data.page, total: data.total, size: data.size }, p => {
      state.page = p; loadList();
    });
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-state-icon">⚠</div><h3>Error</h3><p>${err.message}</p></div></td></tr>`;
  }
}

// ── Filtros ───────────────────────────────────────────────────────────────────
let searchTimeout;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { state.search = e.target.value.trim(); state.page = 1; loadList(); }, 350);
});
document.getElementById('filter-sucursal').addEventListener('change', e => {
  state.sucursal_id = e.target.value; state.page = 1; loadList();
});
document.getElementById('filter-cargo').addEventListener('change', e => {
  state.cargo_id = e.target.value; state.page = 1; loadList();
});
document.getElementById('filter-activos').addEventListener('change', e => {
  state.solo_activos = e.target.value; state.page = 1; loadList();
});

// ── Modal crear ───────────────────────────────────────────────────────────────
document.getElementById('btn-nuevo').addEventListener('click', () => {
  ['f-codigo','f-rut','f-nombres','f-ap','f-am','f-email'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-fecha').value = new Date().toISOString().slice(0, 10);
  openModal('modal-nuevo');
});
document.getElementById('modal-close').addEventListener('click', () => closeModal('modal-nuevo'));
document.getElementById('modal-cancel').addEventListener('click', () => closeModal('modal-nuevo'));

document.getElementById('modal-save').addEventListener('click', async () => {
  const btn = document.getElementById('modal-save');
  const codigo  = document.getElementById('f-codigo').value.trim();
  const rut     = document.getElementById('f-rut').value.trim();
  const nombres = document.getElementById('f-nombres').value.trim();
  const ap      = document.getElementById('f-ap').value.trim();

  if (!codigo || !rut || !nombres || !ap) {
    toast.error('Código, RUT, nombres y apellido paterno son obligatorios.');
    return;
  }

  setLoading(btn, true);
  try {
    const body = {
      codigo, rut, nombres,
      apellido_paterno: ap,
      apellido_materno: document.getElementById('f-am').value.trim() || null,
      email:            document.getElementById('f-email').value.trim() || null,
      fecha_contrato:   document.getElementById('f-fecha').value || null,
    };
    const nuevo = await api.post('/rrhh/trabajadores', body);
    toast.success(`Trabajador ${nuevo.nombre_completo} creado.`);
    closeModal('modal-nuevo');
    window.location.href = `/rrhh/trabajador.html?id=${nuevo.id}`;
  } catch (err) {
    toast.error(err.message);
  } finally {
    setLoading(btn, false);
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
await loadCatalogs();
loadList();
</script>
</body>
</html>
