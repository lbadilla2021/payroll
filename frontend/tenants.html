<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenants — SaaS Platform</title>
  <link rel="stylesheet" href="/static/css/main.css?v=3">
</head>
<body data-page="tenants">

<div id="app-shell">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">S</div>
      <span class="brand-name">SaaS Platform</span>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="profile-trigger" id="profile-trigger">
        <div class="avatar" id="sidebar-avatar">?</div>
        <div class="profile-info">
          <div class="profile-name" id="sidebar-name">…</div>
          <div class="profile-role" id="sidebar-role"></div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="profile-menu" id="profile-menu">
        <div class="menu-item" onclick="window.location.href='/settings.html'">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Configuración
        </div>
        <div class="menu-item" id="theme-toggle-btn">
          <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span id="theme-label">Modo oscuro</span>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="help-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Ayuda
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item danger" id="logout-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cerrar sesión
        </div>
      </div>
    </div>
  </nav>

  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title">Tenants</span>
      <div class="topbar-spacer"></div>
      <button class="btn btn-primary btn-sm" id="btn-new-tenant">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo tenant
      </button>
    </header>

    <main class="page-area">
      <div style="max-width:1100px;">
        <div class="toolbar" style="margin-bottom:var(--space-4);">
          <div class="search-input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="form-input" type="text" id="search-input" placeholder="Buscar tenants…" style="width:100%;">
          </div>
          <select class="form-input form-select" id="filter-status" style="width:auto;min-width:130px;">
            <option value="">Todos los estados</option>
            <option value="true">Activos</option>
            <option value="false">Inactivos</option>
          </select>
          <span id="total-count" style="font-size:13px;color:var(--text-muted);white-space:nowrap;"></span>
        </div>

        <div class="card">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Organización</th>
                  <th>Slug</th>
                  <th>Plan</th>
                  <th>Usuarios</th>
                  <th>Estado</th>
                  <th>Creado</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="tenants-tbody">
                <tr><td colspan="7"><div style="padding:40px;text-align:center;"><div class="spinner" style="margin:0 auto;"></div></div></td></tr>
              </tbody>
            </table>
          </div>
          <div id="pagination" style="padding:var(--space-3) var(--space-4);border-top:1px solid var(--border);"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Create/Edit Panel -->
<div class="panel" id="tenant-panel">
  <div class="panel-header">
    <button class="btn btn-ghost btn-icon" id="panel-close-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <span class="modal-title" id="panel-title">Nuevo tenant</span>
  </div>
  <div class="panel-body">
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Nombre *</label>
        <input class="form-input" type="text" id="f-name" placeholder="Empresa S.A.">
      </div>
      <div class="form-group">
        <label class="form-label">Slug *</label>
        <input class="form-input" type="text" id="f-slug" placeholder="empresa-sa">
        <span class="form-hint">Solo letras, números y guiones</span>
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Plan</label>
        <select class="form-input form-select" id="f-plan">
          <option value="basic">Basic</option>
          <option value="pro">Pro</option>
          <option value="enterprise">Enterprise</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Máx. usuarios</label>
        <input class="form-input" type="number" id="f-max-users" value="5" min="1">
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Email de contacto</label>
        <input class="form-input" type="email" id="f-contact-email" placeholder="contacto@empresa.com">
      </div>
      <div class="form-group">
        <label class="form-label">Teléfono</label>
        <input class="form-input" type="text" id="f-phone" placeholder="+56 9 1234 5678">
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Razón social</label>
        <input class="form-input" type="text" id="f-legal-name" placeholder="Empresa Limitada">
      </div>
      <div class="form-group">
        <label class="form-label">RUT / Tax ID</label>
        <input class="form-input" type="text" id="f-tax-id" placeholder="12.345.678-9">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Dirección</label>
      <input class="form-input" type="text" id="f-address" placeholder="Av. Principal 123, Santiago">
    </div>
    <div class="form-group">
      <label class="form-label">Observaciones</label>
      <textarea class="form-input" id="f-notes" rows="3" style="resize:vertical;"></textarea>
    </div>
    <div id="panel-error" style="display:none;background:var(--error-bg);border:1px solid var(--error);color:var(--error);padding:10px 14px;border-radius:var(--radius-md);font-size:13px;"></div>
  </div>
  <div class="panel-footer">
    <button class="btn btn-secondary" id="panel-cancel-btn">Cancelar</button>
    <button class="btn btn-primary" id="panel-save-btn">Guardar</button>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import api from '/static/js/api.js?v=3';
import { requireAuth, logout, renderProfile } from '/static/js/auth.js?v=3';
import { initTheme, initProfileMenu, toggleTheme, openPanel, closePanel, confirm, setLoading, renderPagination } from '/static/js/ui.js?v=3';
import { toast } from '/static/js/toast.js?v=3';

initTheme();
const user = await requireAuth();
if (user.role !== 'superadmin') { window.location.href = '/app.html'; }
renderProfile(user);
initProfileMenu();

// ── Sidebar nav ───────────────────────────────────────────────────────────────
document.getElementById('sidebar-nav').innerHTML = `
  <div class="nav-item" onclick="window.location.href='/app.html'">
    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Dashboard
  </div>
  <div class="nav-section-label">Administración</div>
  <div class="nav-item active">
    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Tenants
  </div>
  <div class="nav-item" onclick="window.location.href='/users.html'">
    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
    Usuarios
  </div>
`;

// ── Profile menu ──────────────────────────────────────────────────────────────
function _updateThemeUI() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const label = document.getElementById('theme-label');
  const sun   = document.getElementById('theme-icon-sun');
  const moon  = document.getElementById('theme-icon-moon');
  if (label) label.textContent = isDark ? 'Modo claro' : 'Modo oscuro';
  if (sun)   sun.style.display  = isDark ? 'none'  : 'block';
  if (moon)  moon.style.display = isDark ? 'block' : 'none';
}
_updateThemeUI();

document.getElementById('theme-toggle-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  toggleTheme();
  _updateThemeUI();
});

document.getElementById('help-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('profile-menu').classList.remove('open');
  toast.info('Sección de ayuda próximamente disponible.');
});

document.getElementById('logout-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  logout();
});

// ── Panel open/close ──────────────────────────────────────────────────────────
document.getElementById('panel-close-btn').addEventListener('click', () => closePanel('tenant-panel'));
document.getElementById('panel-cancel-btn').addEventListener('click', () => closePanel('tenant-panel'));

// ── State ─────────────────────────────────────────────────────────────────────
let state = { page: 1, search: '', status: '', editing: null };

// ── Load tenants ──────────────────────────────────────────────────────────────
async function loadTenants() {
  const params = new URLSearchParams({ page: state.page, size: 20 });
  if (state.search) params.set('search', state.search);
  if (state.status !== '') params.set('is_active', state.status);

  try {
    const data = await api.get(`/tenants?${params}`);
    document.getElementById('total-count').textContent = `${data.total} tenant${data.total !== 1 ? 's' : ''}`;
    renderTable(data.items);
    renderPagination(
      document.getElementById('pagination'),
      { page: data.page, total: data.total, size: data.size },
      p => { state.page = p; loadTenants(); }
    );
  } catch (err) {
    toast.error(err.message);
  }
}

function renderTable(items) {
  const tbody = document.getElementById('tenants-tbody');
  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">
      <div class="empty-state-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>
      <h3>Sin tenants</h3><p>Crea el primero haciendo clic en "Nuevo tenant"</p>
    </div></td></tr>`;
    return;
  }
  const planColors = { basic: 'badge-neutral', pro: 'badge-info', enterprise: 'badge-warning' };
  tbody.innerHTML = items.map(t => `
    <tr>
      <td>
        <div style="font-weight:500;color:var(--text-primary);">${esc(t.name)}</div>
        ${t.legal_name ? `<div style="font-size:12px;color:var(--text-muted);">${esc(t.legal_name)}</div>` : ''}
      </td>
      <td><code style="font-size:12px;background:var(--bg-active);padding:2px 6px;border-radius:4px;">${esc(t.slug)}</code></td>
      <td><span class="badge ${planColors[t.plan] || 'badge-neutral'}">${t.plan}</span></td>
      <td>
        <span style="font-weight:600;color:var(--text-primary);">${t.user_count ?? 0}</span>
        <span style="color:var(--text-muted);font-size:12px;">/ ${t.max_users}</span>
      </td>
      <td><span class="badge ${t.is_active ? 'badge-success' : 'badge-error'}">${t.is_active ? 'Activo' : 'Inactivo'}</span></td>
      <td style="white-space:nowrap;font-size:12px;">${formatDate(t.created_at)}</td>
      <td>
        <div style="display:flex;gap:4px;justify-content:flex-end;">
          <button class="btn btn-ghost btn-icon btn-sm" title="Editar" onclick='editTenant(${JSON.stringify(t)})'>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn btn-ghost btn-icon btn-sm" title="${t.is_active ? 'Desactivar' : 'Activar'}" onclick="toggleTenant('${t.id}', ${t.is_active})">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
          </button>
        </div>
      </td>
    </tr>`).join('');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(d) { return d ? new Date(d).toLocaleDateString('es-CL') : '—'; }

function clearPanel() {
  ['f-name','f-slug','f-contact-email','f-phone','f-legal-name','f-tax-id','f-address','f-notes'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('f-max-users').value = 5;
  document.getElementById('f-plan').value = 'basic';
  document.getElementById('panel-error').style.display = 'none';
}

// ── New tenant ────────────────────────────────────────────────────────────────
document.getElementById('btn-new-tenant').addEventListener('click', () => {
  state.editing = null;
  document.getElementById('panel-title').textContent = 'Nuevo tenant';
  clearPanel();
  openPanel('tenant-panel');
});

// ── Edit tenant ───────────────────────────────────────────────────────────────
window.editTenant = (t) => {
  state.editing = t;
  document.getElementById('panel-title').textContent = 'Editar tenant';
  document.getElementById('f-name').value         = t.name || '';
  document.getElementById('f-slug').value         = t.slug || '';
  document.getElementById('f-plan').value         = t.plan || 'basic';
  document.getElementById('f-max-users').value    = t.max_users || 5;
  document.getElementById('f-contact-email').value = t.contact_email || '';
  document.getElementById('f-phone').value        = t.contact_phone || '';
  document.getElementById('f-legal-name').value   = t.legal_name || '';
  document.getElementById('f-tax-id').value       = t.tax_id || '';
  document.getElementById('f-address').value      = t.address || '';
  document.getElementById('f-notes').value        = t.notes || '';
  document.getElementById('panel-error').style.display = 'none';
  openPanel('tenant-panel');
};

// ── Toggle active ─────────────────────────────────────────────────────────────
window.toggleTenant = async (id, currentActive) => {
  const action = currentActive ? 'desactivar' : 'activar';
  const ok = await confirm(`¿Seguro que deseas ${action} este tenant?`, 'Confirmar acción');
  if (!ok) return;
  try {
    await api.patch(`/tenants/${id}/toggle-active`);
    toast.success(`Tenant ${action}do exitosamente.`);
    loadTenants();
  } catch (err) { toast.error(err.message); }
};

// ── Save ──────────────────────────────────────────────────────────────────────
document.getElementById('panel-save-btn').addEventListener('click', async () => {
  const btn   = document.getElementById('panel-save-btn');
  const errEl = document.getElementById('panel-error');
  errEl.style.display = 'none';

  const payload = {
    name:          document.getElementById('f-name').value.trim(),
    slug:          document.getElementById('f-slug').value.trim().toLowerCase(),
    plan:          document.getElementById('f-plan').value,
    max_users:     parseInt(document.getElementById('f-max-users').value),
    contact_email: document.getElementById('f-contact-email').value.trim() || null,
    contact_phone: document.getElementById('f-phone').value.trim() || null,
    legal_name:    document.getElementById('f-legal-name').value.trim() || null,
    tax_id:        document.getElementById('f-tax-id').value.trim() || null,
    address:       document.getElementById('f-address').value.trim() || null,
    notes:         document.getElementById('f-notes').value.trim() || null,
  };

  if (!payload.name || !payload.slug) {
    errEl.textContent = 'Nombre y slug son obligatorios.';
    errEl.style.display = 'block';
    return;
  }

  setLoading(btn, true);
  try {
    if (state.editing) {
      await api.patch(`/tenants/${state.editing.id}`, payload);
      toast.success('Tenant actualizado.');
    } else {
      await api.post('/tenants', payload);
      toast.success('Tenant creado exitosamente.');
    }
    closePanel('tenant-panel');
    loadTenants();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  } finally {
    setLoading(btn, false);
  }
});

// ── Filters ───────────────────────────────────────────────────────────────────
let searchTimer;
document.getElementById('search-input').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.search = e.target.value; state.page = 1; loadTenants(); }, 350);
});
document.getElementById('filter-status').addEventListener('change', (e) => {
  state.status = e.target.value; state.page = 1; loadTenants();
});

// Auto-generate slug from name
document.getElementById('f-name').addEventListener('input', (e) => {
  if (state.editing) return;
  const slug = e.target.value.toLowerCase().trim()
    .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i')
    .replace(/[óòö]/g,'o').replace(/[úùü]/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').slice(0,100);
  document.getElementById('f-slug').value = slug;
});

loadTenants();
</script>
</body>
</html>
