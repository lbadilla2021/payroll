<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payroll Chile - Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-hero">
        <h1>Payroll Chile</h1>
        <p>
          Plataforma de remuneraciones para Chile. Administra tenants, usuarios y operación centralizada
          desde un único acceso superadmin.
        </p>
      </section>

      <section class="login-card">
        <h2>Iniciar sesión</h2>
        <p class="muted">Acceso al panel de administración</p>
        <form id="login-form">
          <label>Email</label>
          <input type="email" id="email" required />
          <label>Contraseña</label>
          <input type="password" id="password" required />
          <button type="submit">Ingresar</button>
        </form>
        <p id="message" class="message"></p>
      </section>
    </main>
    <script src="/js/login.js"></script>
  </body>
</html>
