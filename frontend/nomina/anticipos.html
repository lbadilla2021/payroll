<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anticipos — Nómina</title>
  <link rel="stylesheet" href="/static/css/main.css?v=4">
</head>
<body data-page="anticipos">

<div id="app-shell">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">N</div>
      <span class="brand-name">Nómina SaaS</span>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="profile-trigger" id="profile-trigger">
        <div class="avatar" id="sidebar-avatar">?</div>
        <div class="profile-info">
          <div class="profile-name" id="sidebar-name">…</div>
          <div class="profile-role" id="sidebar-role"></div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="profile-menu" id="profile-menu">
        <div class="menu-item" onclick="window.location.href='/settings.html'">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Configuración
        </div>
        <div class="menu-item" id="theme-toggle-btn">
          <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span id="theme-label">Modo oscuro</span>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="help-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Ayuda
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item danger" id="logout-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cerrar sesión
        </div>
      </div>
    </div>
  </nav>

  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title">Anticipos de remuneraciones</span>
      <div class="topbar-spacer"></div>
      <button class="btn btn-primary btn-sm" id="btn-nuevo">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo anticipo
      </button>
    </header>

    <main class="page-area">
      <div style="max-width:1100px;">

        <div class="toolbar" style="margin-bottom:var(--space-4);">
          <select class="form-input form-select" id="filter-trabajador" style="width:auto;min-width:200px;">
            <option value="">Todos los trabajadores</option>
          </select>
          <select class="form-input form-select" id="filter-anio" style="width:auto;min-width:110px;">
            <option value="">Todos los años</option>
          </select>
          <select class="form-input form-select" id="filter-mes" style="width:auto;min-width:130px;">
            <option value="">Todos los meses</option>
            <option value="1">Enero</option>
            <option value="2">Febrero</option>
            <option value="3">Marzo</option>
            <option value="4">Abril</option>
            <option value="5">Mayo</option>
            <option value="6">Junio</option>
            <option value="7">Julio</option>
            <option value="8">Agosto</option>
            <option value="9">Septiembre</option>
            <option value="10">Octubre</option>
            <option value="11">Noviembre</option>
            <option value="12">Diciembre</option>
          </select>
          <select class="form-input form-select" id="filter-estado" style="width:auto;min-width:140px;">
            <option value="">Todos los estados</option>
            <option value="pendiente">Pendiente</option>
            <option value="procesado">Procesado</option>
            <option value="anulado">Anulado</option>
          </select>
          <span id="total-count" style="font-size:13px;color:var(--text-muted);white-space:nowrap;margin-left:auto;"></span>
        </div>

        <div class="card">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Trabajador</th>
                  <th style="text-align:center;">Período</th>
                  <th style="text-align:right;">Monto</th>
                  <th>Fecha emisión</th>
                  <th>Estado</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="tbody">
                <tr><td colspan="6"><div style="padding:40px;text-align:center;"><div class="spinner" style="margin:0 auto;"></div></div></td></tr>
              </tbody>
            </table>
          </div>
          <div class="pagination" id="pagination"></div>
        </div>

      </div>
    </main>
  </div>
</div>

<!-- Modal nuevo anticipo -->
<div class="modal" id="modal-anticipo">
  <div class="modal-header">
    <span class="modal-title" id="modal-anticipo-title">Nuevo anticipo</span>
    <button class="btn btn-ghost btn-sm" id="modal-anticipo-close">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="modal-body">
    <div class="form-group">
      <label class="form-label">Trabajador *</label>
      <select class="form-input form-select" id="ant-trabajador"></select>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Año *</label>
        <input class="form-input" id="ant-anio" type="number" min="2020" max="2100" step="1">
      </div>
      <div class="form-group">
        <label class="form-label">Mes *</label>
        <select class="form-input form-select" id="ant-mes">
          <option value="">— Seleccionar —</option>
          <option value="1">Enero</option>
          <option value="2">Febrero</option>
          <option value="3">Marzo</option>
          <option value="4">Abril</option>
          <option value="5">Mayo</option>
          <option value="6">Junio</option>
          <option value="7">Julio</option>
          <option value="8">Agosto</option>
          <option value="9">Septiembre</option>
          <option value="10">Octubre</option>
          <option value="11">Noviembre</option>
          <option value="12">Diciembre</option>
        </select>
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Monto *</label>
        <input class="form-input" id="ant-monto" type="number" min="1" step="1" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">Fecha de emisión *</label>
        <input class="form-input" id="ant-fecha" type="date">
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" id="modal-anticipo-cancel">Cancelar</button>
    <button class="btn btn-primary" id="modal-anticipo-save">Guardar</button>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import api from '/static/js/api.js?v=4';
import { requireAuth } from '/static/js/auth.js?v=3';
import { initTheme, openModal, closeModal, setLoading, renderPagination, confirm } from '/static/js/ui.js?v=3';
import { toast } from '/static/js/toast.js?v=3';
import { initShellUI } from '/static/js/nav.js';

initTheme();
const user = await requireAuth();
initShellUI(user);

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const fmtDate = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('es-CL') : '—';
const fmtCLP  = n => n != null ? `$ ${Number(n).toLocaleString('es-CL')}` : '—';
const ESTADO_CLASS = { pendiente: 'badge-warning', procesado: 'badge-success', anulado: 'badge-danger' };

let state = { page: 1, size: 25, trabajador_id: '', anio: '', mes: '', estado: '' };
let cats  = { trabajadores: [] };
let editId = null;

// ── Catálogos ─────────────────────────────────────────────────────────────────
async function loadCatalogs() {
  const anioNow = new Date().getFullYear();
  const selAnio = document.getElementById('filter-anio');
  for (let y = anioNow; y >= anioNow - 5; y--) {
    selAnio.insertAdjacentHTML('beforeend', `<option value="${y}">${y}</option>`);
  }

  try {
    const data = await api.get('/rrhh/trabajadores?size=200&solo_activos=true');
    cats.trabajadores = data.items ?? [];
    const selW = document.getElementById('filter-trabajador');
    cats.trabajadores.forEach(w =>
      selW.insertAdjacentHTML('beforeend', `<option value="${w.id}">${w.nombre_completo}</option>`));
  } catch { cats.trabajadores = []; }
}

function lookupW(id) {
  return cats.trabajadores.find(w => w.id === id)?.nombre_completo ?? '—';
}

function trabajadoresOpts(sel = '') {
  return `<option value="">— Seleccionar —</option>` +
    cats.trabajadores.map(w =>
      `<option value="${w.id}" ${w.id === sel ? 'selected' : ''}>${w.nombre_completo}</option>`
    ).join('');
}

// ── Lista ─────────────────────────────────────────────────────────────────────
async function loadList() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = `<tr><td colspan="6"><div style="padding:32px;text-align:center;"><div class="spinner" style="margin:0 auto;"></div></div></td></tr>`;
  const p = new URLSearchParams({ page: state.page, size: state.size });
  if (state.trabajador_id) p.set('trabajador_id', state.trabajador_id);
  if (state.anio)          p.set('anio', state.anio);
  if (state.mes)           p.set('mes', state.mes);
  if (state.estado)        p.set('estado', state.estado);
  try {
    const data = await api.get(`/nomina/anticipos?${p}`);
    const items = data.items ?? [];
    document.getElementById('total-count').textContent =
      `${data.total} anticipo${data.total !== 1 ? 's' : ''}`;
    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
        <div class="empty-state-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        </div>
        <h3>Sin anticipos</h3><p>No hay anticipos registrados para los filtros seleccionados.</p>
      </div></td></tr>`;
      renderPagination(document.getElementById('pagination'), { page:1, total:0, size:state.size }, ()=>{});
      return;
    }
    tbody.innerHTML = items.map(a => `
      <tr data-id="${a.id}">
        <td class="td-primary">${lookupW(a.trabajador_id)}</td>
        <td style="text-align:center;font-size:13px;">${MESES[a.mes-1]} ${a.anio}</td>
        <td style="text-align:right;font-family:monospace;font-size:13px;font-weight:600;">${fmtCLP(a.monto)}</td>
        <td style="font-size:13px;">${fmtDate(a.fecha_emision)}</td>
        <td><span class="badge ${ESTADO_CLASS[a.estado] ?? 'badge-neutral'}">${a.estado}</span></td>
        <td style="text-align:right;">
          ${a.estado === 'pendiente' ? `
            <button class="btn btn-ghost btn-sm btn-editar" data-id="${a.id}" title="Editar">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </button>
            <button class="btn btn-ghost btn-sm btn-anular" data-id="${a.id}" title="Anular" style="color:var(--danger);">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
            </button>` : ''}
        </td>
      </tr>`).join('');

    tbody.querySelectorAll('.btn-editar').forEach(btn =>
      btn.addEventListener('click', e => { e.stopPropagation(); openEdit(btn.dataset.id, items); }));
    tbody.querySelectorAll('.btn-anular').forEach(btn =>
      btn.addEventListener('click', e => { e.stopPropagation(); anular(btn.dataset.id); }));

    renderPagination(document.getElementById('pagination'),
      { page: data.page, total: data.total, size: data.size },
      pg => { state.page = pg; loadList(); });
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">⚠</div><h3>Error</h3><p>${err.message}</p></div></td></tr>`;
  }
}

// ── Anular ────────────────────────────────────────────────────────────────────
async function anular(id) {
  if (!await confirm('¿Anular este anticipo? Esta acción no se puede deshacer.', 'Anular anticipo')) return;
  try {
    await api.patch(`/nomina/anticipos/${id}/anular`, {});
    toast.success('Anticipo anulado.');
    loadList();
  } catch (err) { toast.error(err.message); }
}

// ── Modal crear / editar ──────────────────────────────────────────────────────
function resetModal() {
  editId = null;
  document.getElementById('modal-anticipo-title').textContent = 'Nuevo anticipo';
  document.getElementById('ant-trabajador').innerHTML = trabajadoresOpts();
  const now = new Date();
  document.getElementById('ant-anio').value  = now.getFullYear();
  document.getElementById('ant-mes').value   = now.getMonth() + 1;
  document.getElementById('ant-monto').value = '';
  document.getElementById('ant-fecha').value = now.toISOString().slice(0, 10);
}

function openEdit(id, items) {
  const a = items.find(x => x.id === id);
  if (!a) return;
  editId = id;
  document.getElementById('modal-anticipo-title').textContent = 'Editar anticipo';
  document.getElementById('ant-trabajador').innerHTML = trabajadoresOpts(a.trabajador_id);
  document.getElementById('ant-anio').value  = a.anio;
  document.getElementById('ant-mes').value   = a.mes;
  document.getElementById('ant-monto').value = a.monto;
  document.getElementById('ant-fecha').value = a.fecha_emision;
  openModal('modal-anticipo');
}

document.getElementById('btn-nuevo').addEventListener('click', () => {
  resetModal(); openModal('modal-anticipo');
});
document.getElementById('modal-anticipo-close').addEventListener('click',  () => closeModal('modal-anticipo'));
document.getElementById('modal-anticipo-cancel').addEventListener('click', () => closeModal('modal-anticipo'));

document.getElementById('modal-anticipo-save').addEventListener('click', async () => {
  const btn          = document.getElementById('modal-anticipo-save');
  const trabajador_id = document.getElementById('ant-trabajador').value;
  const anio          = parseInt(document.getElementById('ant-anio').value);
  const mes           = parseInt(document.getElementById('ant-mes').value);
  const monto         = parseFloat(document.getElementById('ant-monto').value);
  const fecha_emision = document.getElementById('ant-fecha').value;

  if (!trabajador_id)           { toast.error('Selecciona un trabajador.'); return; }
  if (!anio || anio < 2020)     { toast.error('Ingresa un año válido.'); return; }
  if (!mes)                     { toast.error('Selecciona el mes.'); return; }
  if (!monto || monto <= 0)     { toast.error('Ingresa un monto válido.'); return; }
  if (!fecha_emision)           { toast.error('Ingresa la fecha de emisión.'); return; }

  setLoading(btn, true);
  try {
    if (editId) {
      await api.patch(`/nomina/anticipos/${editId}`, { monto });
      toast.success('Anticipo actualizado.');
    } else {
      await api.post('/nomina/anticipos', { trabajador_id, anio, mes, monto, fecha_emision });
      toast.success('Anticipo creado correctamente.');
    }
    closeModal('modal-anticipo');
    loadList();
  } catch (err) { toast.error(err.message); }
  finally { setLoading(btn, false); }
});

// ── Filtros ───────────────────────────────────────────────────────────────────
document.getElementById('filter-trabajador').addEventListener('change', e => {
  state.trabajador_id = e.target.value; state.page = 1; loadList();
});
document.getElementById('filter-anio').addEventListener('change', e => {
  state.anio = e.target.value; state.page = 1; loadList();
});
document.getElementById('filter-mes').addEventListener('change', e => {
  state.mes = e.target.value; state.page = 1; loadList();
});
document.getElementById('filter-estado').addEventListener('change', e => {
  state.estado = e.target.value; state.page = 1; loadList();
});

// ── Init ──────────────────────────────────────────────────────────────────────
await loadCatalogs();
loadList();
</script>
</body>
</html>
