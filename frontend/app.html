<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — SaaS Platform</title>
  <link rel="stylesheet" href="/static/css/main.css?v=3">
</head>
<body data-page="dashboard">

<div id="app-shell">

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">S</div>
      <span class="brand-name">SaaS Platform</span>
    </div>

    <div class="sidebar-nav" id="sidebar-nav"></div>

    <div class="sidebar-footer">
      <div class="profile-trigger" id="profile-trigger">
        <div class="avatar" id="sidebar-avatar">?</div>
        <div class="profile-info">
          <div class="profile-name" id="sidebar-name">Cargando...</div>
          <div class="profile-role" id="sidebar-role"></div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="profile-menu" id="profile-menu">
        <div class="menu-item" onclick="window.location.href='/settings.html'">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Configuración
        </div>
        <div class="menu-item" id="theme-toggle-btn">
          <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span id="theme-label">Modo oscuro</span>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="help-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Ayuda
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item danger" id="logout-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cerrar sesión
        </div>
      </div>
    </div>
  </nav>

  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title" id="page-title">Dashboard</span>
      <div class="topbar-spacer"></div>
    </header>
    <main class="page-area" id="page-content">
      <div style="display:flex;align-items:center;justify-content:center;height:200px;">
        <div class="spinner" style="width:32px;height:32px;"></div>
      </div>
    </main>
  </div>

</div>

<div id="toast-container"></div>

<script type="module">
import api  from '/static/js/api.js?v=4';
import { requireAuth } from '/static/js/auth.js?v=3';
import { initTheme } from '/static/js/ui.js?v=3';
import { initShellUI } from '/static/js/nav.js';

initTheme();
const user = await requireAuth();
initShellUI(user);

const isSuperadmin = () => user.role === 'superadmin';

// ── Dashboard ─────────────────────────────────────────────────────────────────
document.getElementById('page-title').textContent = 'Dashboard';

async function loadDashboard() {
  const content = document.getElementById('page-content');
  try {
    let tenants = 0, users = 0;
    if (isSuperadmin()) {
      const [td, ud] = await Promise.all([
        api.get('/tenants?size=1'),
        api.get('/users?size=1'),
      ]);
      tenants = td.total;
      users   = ud.total;
    }

    content.innerHTML = `
      <div style="max-width:1100px;">
        <div style="margin-bottom:var(--space-6);">
          <h2 style="font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:4px;">
            Hola, ${user.first_name} 👋
          </h2>
          <p style="color:var(--text-muted);font-size:14px;">
            ${new Date().toLocaleDateString('es-CL', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}
          </p>
        </div>

        <div class="stats-grid">
          ${isSuperadmin() ? `
          <div class="stat-card">
            <span class="stat-label">Tenants</span>
            <span class="stat-value">${tenants}</span>
            <span class="stat-sub">Total registrados</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Usuarios</span>
            <span class="stat-value">${users}</span>
            <span class="stat-sub">Todas las organizaciones</span>
          </div>` : ''}
          <div class="stat-card">
            <span class="stat-label">Tu rol</span>
            <span class="stat-value" style="font-size:18px;">${isSuperadmin() ? 'Superadmin' : 'Administrador'}</span>
            <span class="stat-sub">${isSuperadmin() ? 'Acceso global' : 'Tu organización'}</span>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title">Accesos rápidos</span></div>
          <div class="card-body">
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:var(--space-3);">
              ${isSuperadmin() ? `
              <div onclick="window.location.href='/tenants.html'"
                   style="padding:var(--space-4);border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;"
                   onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background=''">
                <div style="font-size:22px;margin-bottom:8px;">🏢</div>
                <div style="font-weight:600;font-size:13.5px;color:var(--text-primary);">Gestionar Tenants</div>
                <div style="font-size:12px;color:var(--text-muted);">Crear y administrar organizaciones</div>
              </div>` : ''}
              <div onclick="window.location.href='/users.html'"
                   style="padding:var(--space-4);border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;"
                   onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background=''">
                <div style="font-size:22px;margin-bottom:8px;">👥</div>
                <div style="font-weight:600;font-size:13.5px;color:var(--text-primary);">Gestionar Usuarios</div>
                <div style="font-size:12px;color:var(--text-muted);">Administrar accesos y roles</div>
              </div>
              <div onclick="window.location.href='/groups.html'"
                   style="padding:var(--space-4);border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;"
                   onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background=''">
                <div style="font-size:22px;margin-bottom:8px;">👥</div>
                <div style="font-weight:600;font-size:13.5px;color:var(--text-primary);">Gestionar Grupos</div>
                <div style="font-size:12px;color:var(--text-muted);">Agrupar usuarios y asignar roles</div>
              </div>
              <div onclick="window.location.href='/roles.html'"
                   style="padding:var(--space-4);border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;"
                   onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background=''">
                <div style="font-size:22px;margin-bottom:8px;">🛡️</div>
                <div style="font-weight:600;font-size:13.5px;color:var(--text-primary);">Gestionar Roles</div>
                <div style="font-size:12px;color:var(--text-muted);">Permisos y control de acceso</div>
              </div>
              <div onclick="window.location.href='/change-password.html'"
                   style="padding:var(--space-4);border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;"
                   onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background=''">
                <div style="font-size:22px;margin-bottom:8px;">🔒</div>
                <div style="font-weight:600;font-size:13.5px;color:var(--text-primary);">Cambiar contraseña</div>
                <div style="font-size:12px;color:var(--text-muted);">Actualizar credenciales</div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
  } catch (err) {
    content.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">⚠</div>
      <h3>Error al cargar</h3>
      <p>${err.message}</p>
    </div>`;
  }
}

loadDashboard();
</script>
</body>
</html>
