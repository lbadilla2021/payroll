version: "3.9"

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       saas_db
      POSTGRES_USER:     saas_user
      POSTGRES_PASSWORD: saas_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_user -d saas_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://saas_user:saas_pass@db:5432/saas_db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"   # exposed for local dev; remove in prod
    networks:
      - saas-net
    command: >
      sh -c "alembic upgrade head &&
             python -m app.scripts.bootstrap &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - saas-net

volumes:
  postgres_data:

networks:
  saas-net:
    driver: bridge
