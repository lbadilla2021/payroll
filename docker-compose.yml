version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payroll}
      POSTGRES_USER: ${POSTGRES_USER:-payroll}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payroll}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - payroll-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payroll}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://payroll:payroll@db:5432/payroll}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ISSUER: ${JWT_ISSUER:-payroll-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-payroll-web}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-10}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-7}
      SESSION_IDLE_TIMEOUT_MINUTES: ${SESSION_IDLE_TIMEOUT_MINUTES:-30}
      SESSION_ABSOLUTE_TIMEOUT_MINUTES: ${SESSION_ABSOLUTE_TIMEOUT_MINUTES:-10080}
      PASSWORD_RESET_TOKEN_MINUTES: ${PASSWORD_RESET_TOKEN_MINUTES:-15}
      LOGIN_MAX_ATTEMPTS: ${LOGIN_MAX_ATTEMPTS:-5}
      LOGIN_WINDOW_MINUTES: ${LOGIN_WINDOW_MINUTES:-15}
      PASSWORD_RESET_REQUESTS_PER_HOUR: ${PASSWORD_RESET_REQUESTS_PER_HOUR:-5}
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-12}
      ALLOW_GLOBAL_EMAIL_UNIQUENESS: ${ALLOW_GLOBAL_EMAIL_UNIQUENESS:-false}
      BLOCKLIST_PATH: ${BLOCKLIST_PATH:-app/security/password_blocklist.txt}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      ENABLE_PASSWORD_RECOVERY: ${ENABLE_PASSWORD_RECOVERY:-true}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-mailhog}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-mailhog}
      SMTP_FROM: ${SMTP_FROM:-no-reply@payroll.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Payroll Security}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-superadmin@payroll.local}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - payroll-network
    command: >
      sh -c "
      echo 'Esperando DB...' &&
      sleep 3 &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    ports:
      - "8090:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - payroll-network

volumes:
  postgres_data:

networks:
  payroll-network:
    driver: bridge